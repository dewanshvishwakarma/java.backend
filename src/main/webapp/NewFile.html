<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form action="studentservelt" method="post">
        <label for="sid">Student ID:</label><br>
        <input type="text" id="sid" name="studentId" required><br><br>

        <label for="name">Student Name:</label><br>
        <input type="text" id="name" name="studentName" required><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="30" required></textarea><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
